<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Verse – Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:   #08080f;
    --deep:    #0d0d1a;
    --purple1: #5b3fe8;
    --purple2: #c040ff;
    --gold:    #f4c430;
    --white:   #f0f0ff;
    --muted:   rgba(240,240,255,0.45);
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── Stars canvas ── */
  #stars { position: fixed; inset: 0; z-index: 0; }

  /* ── Orbit ring ── */
  .orbit-ring {
    position: fixed;
    width: 680px; height: 680px;
    border: 1px solid rgba(91,63,232,.18);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) rotateX(72deg);
    animation: spinRing 14s linear infinite;
    z-index: 1;
    pointer-events: none;
  }
  .orbit-ring::after {
    content: '';
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 12px 4px var(--gold);
  }
  @keyframes spinRing { to { transform: translate(-50%,-50%) rotateX(72deg) rotateZ(360deg); } }

  /* ── Main layout ── */
  .scene {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    gap: 0;
  }

  /* ── Logo ── */
  .logo-wrap {
    width: min(480px, 90vw);
    opacity: 0;
    animation: fadeUp .9s .2s ease forwards;
  }
  .logo-wrap img { width: 100%; display: block; }

  /* ── Slogan ── */
  .slogan {
    margin-top: 32px;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(10px, 2.4vw, 16px);
    font-weight: 600;
    letter-spacing: .35em;
    color: transparent;
    background: linear-gradient(90deg, var(--purple1), var(--purple2), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    opacity: 0;
    animation: fadeUp .9s .5s ease forwards;
    white-space: nowrap;
  }

  /* ── Coming Soon headline ── */
  .headline {
    margin-top: 40px;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 64px);
    font-weight: 900;
    line-height: 1.1;
    text-align: center;
    color: var(--white);
    opacity: 0;
    animation: fadeUp .9s .7s ease forwards;
  }
  .headline span {
    display: block;
    font-size: clamp(12px, 2vw, 18px);
    font-weight: 400;
    letter-spacing: .2em;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }

  /* ── Divider ── */
  .divider {
    margin-top: 36px;
    width: 240px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple1), var(--gold), var(--purple2), transparent);
    opacity: 0;
    animation: fadeIn .9s 1s ease forwards;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(22px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .notify { flex-direction: column; align-items: center; }
    .notify input { width: 90vw; }
    .orbit-ring { width: 380px; height: 380px; }
  }

</style>
</head>

<script>
/* ── Rich Background ── */
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W, H;

  // ── Layer 1: Twinkling stars ──
  let stars = [];
  function makeStars(){
    stars = Array.from({length: 260}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.6+.2,
      a: Math.random(), da: (Math.random()-.5)*.012,
      hue: Math.random() < .15 ? 45 : (Math.random() < .3 ? 200 : 260)
    }));
  }

  // ── Layer 2: Shooting stars ──
  let shoots = [];
  function spawnShoot(){
    const angle = Math.PI/6 + Math.random()*(Math.PI/8);
    shoots.push({
      x: Math.random()*W*.7, y: Math.random()*H*.4,
      len: 80 + Math.random()*120,
      speed: 6 + Math.random()*8,
      angle,
      life: 1, decay: .025 + Math.random()*.02
    });
  }
  setInterval(() => { if(shoots.length < 4) spawnShoot(); }, 900);

  // ── Layer 3: Floating dust motes ──
  let dust = [];
  function makeDust(){
    dust = Array.from({length: 120}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*.8+.2,
      vx: (Math.random()-.5)*.18,
      vy: (Math.random()-.5)*.18,
      a: Math.random()*.35+.05
    }));
  }

  // ── Layer 4: Nebula blobs ──
  let nebulas = [];
  function makeNebulas(){
    nebulas = [
      { x: W*.12, y: H*.2,  r: 260, c: '91,63,232',  a: .055 },
      { x: W*.88, y: H*.75, r: 300, c: '192,64,255', a: .045 },
      { x: W*.55, y: H*.1,  r: 200, c: '20,60,200',  a: .04  },
      { x: W*.3,  y: H*.85, r: 220, c: '244,196,48', a: .03  },
      { x: W*.75, y: H*.35, r: 180, c: '91,63,232',  a: .035 },
    ];
  }

  // ── Layer 5: Pulsing orbs ──
  let orbs = [];
  function makeOrbs(){
    orbs = Array.from({length: 6}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      baseR: 2 + Math.random()*3,
      pulse: Math.random()*Math.PI*2,
      speed: .018 + Math.random()*.015,
      color: Math.random() < .5 ? '91,63,232' : '244,196,48'
    }));
  }

  // ── Layer 6: Constellation lines ──
  let nodes = [];
  function makeNodes(){
    nodes = Array.from({length: 18}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.22,
      vy: (Math.random()-.5)*.22,
    }));
  }

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    makeStars(); makeDust(); makeNebulas(); makeNodes();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // Nebula blobs
    nebulas.forEach(n => {
      const g = ctx.createRadialGradient(n.x,n.y,0, n.x,n.y,n.r);
      g.addColorStop(0, `rgba(${n.c},${n.a})`);
      g.addColorStop(1, `rgba(${n.c},0)`);
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
    });

    // Constellation lines
    for(let i=0; i<nodes.length; i++){
      for(let j=i+1; j<nodes.length; j++){
        const dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < 220){
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(160,120,255,${.55*(1-dist/220)})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }
    }
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if(n.x<0||n.x>W) n.vx*=-1;
      if(n.y<0||n.y>H) n.vy*=-1;
      // draw node dot
      ctx.beginPath();
      ctx.arc(n.x, n.y, 1.8, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(180,140,255,0.7)';
      ctx.fill();
    });

    // Twinkling stars
    stars.forEach(s => {
      s.a = Math.max(.05, Math.min(1, s.a+s.da));
      if(s.a<=.05||s.a>=1) s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${s.hue},80%,85%,${s.a})`;
      ctx.fill();
    });

    // Dust motes
    dust.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if(d.x<0) d.x=W; if(d.x>W) d.x=0;
      if(d.y<0) d.y=H; if(d.y>H) d.y=0;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(180,160,255,${d.a})`;
      ctx.fill();
    });

    // Shooting stars
    shoots.forEach((s,i) => {
      s.x += Math.cos(s.angle)*s.speed;
      s.y += Math.sin(s.angle)*s.speed;
      s.life -= s.decay;
      const tx = s.x - Math.cos(s.angle)*s.len;
      const ty = s.y - Math.sin(s.angle)*s.len;
      const g = ctx.createLinearGradient(tx,ty, s.x,s.y);
      g.addColorStop(0, `rgba(255,255,255,0)`);
      g.addColorStop(1, `rgba(255,255,255,${s.life*.9})`);
      ctx.beginPath();
      ctx.moveTo(tx,ty);
      ctx.lineTo(s.x,s.y);
      ctx.strokeStyle = g;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      if(s.life<=0) shoots.splice(i,1);
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); draw();
})();



</script>
